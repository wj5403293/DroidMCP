name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean; run 'gofmt -w .' (or 'make fmt'):"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  gosec:
    name: Security (gosec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Mirror the gosec excludes declared in .golangci.yml so the standalone
      # binary applies the same policy as the lint job. Rationale for each
      # rule lives in .golangci.yml (linters.settings.gosec.excludes).
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude=G104,G115,G204,G301,G304,G306,G404 ./...

  build:
    name: Build ARM64 Binaries
    needs: [test, lint, gosec]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        service: [filesystem, github, scraper, termux, network, clipboard]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build reproducible binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
          GOFLAGS: "-trimpath"
          VERSION: ${{ github.ref_name }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -buildid= -X github.com/kahz12/droidmcp/internal/buildinfo.Version=${VERSION}" \
            -o droidmcp-${{ matrix.service }} \
            ./cmd/${{ matrix.service }}

      - name: Generate per-binary SHA256
        run: sha256sum droidmcp-${{ matrix.service }} > droidmcp-${{ matrix.service }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidmcp-${{ matrix.service }}
          path: |
            droidmcp-${{ matrix.service }}
            droidmcp-${{ matrix.service }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Flatten artifacts and build SHA256SUMS
        run: |
          mkdir -p release
          for d in droidmcp-*; do
            cp "$d"/* release/
          done
          cd release
          sha256sum droidmcp-* > SHA256SUMS
          rm -f *.sha256
          ls -la

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (keyless)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature release/SHA256SUMS.sig \
            --output-certificate release/SHA256SUMS.pem \
            release/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/droidmcp-filesystem
            release/droidmcp-github
            release/droidmcp-scraper
            release/droidmcp-termux
            release/droidmcp-network
            release/droidmcp-clipboard
            release/SHA256SUMS
            release/SHA256SUMS.sig
            release/SHA256SUMS.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
